steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/classroom-ai', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/classroom-ai']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - classroom-ai
      - --image
      - gcr.io/$PROJECT_ID/classroom-ai
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --memory
      - 512Mi
      - --set-env-vars
      - OPENAI_API_KEY=$_OPENAI_API_KEY

substitutions:
  _OPENAI_API_KEY: ''

images:
  - 'gcr.io/$PROJECT_ID/classroom-ai'
